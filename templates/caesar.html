{% extends "base.html" %}
{% block content %}

<div class="tool-page">
  <div class="tool-header">
    <div class="tool-page-icon purple">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <div>
      <h1>Caesar Vector Algorithm</h1>
      <p class="tool-subtitle">Shift letters, numbers, spaces, and symbols using a scalar vector.</p>
    </div>
  </div>

  <div class="cipher-grid">
    <div class="panel">
      <div class="mode-tabs">
        <button class="tab active" id="tab-enc" onclick="setMode('encrypt')">Encrypt Payload</button>
        <button class="tab" id="tab-dec" onclick="setMode('decrypt')">Decrypt Payload</button>
      </div>

      <label class="field-label">SOURCE DATA</label>
      <textarea id="caesar-input" class="field-textarea" placeholder="Enter text..."></textarea>

      <label class="field-label">SHIFT VECTOR (INTEGER)</label>
      <input type="number" id="caesar-shift" class="field-input" value="3" min="0" max="94" />

      <button class="btn-execute" onclick="runCaesar()">
        <span id="caesar-btn-label">Execute Encryption</span>
      </button>
    </div>

    <div class="panel output-panel">
      <div class="output-header">
        <span class="field-label">PROCESSED OUTPUT</span>
        <button class="copy-btn" onclick="copyOutput('caesar-output')" title="Copy">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
      <div id="caesar-output" class="output-content">
        <div class="awaiting">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:24px"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
          AWAITING INPUT
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
{% block scripts %}
<script>
let currentMode = 'encrypt';

function setMode(mode) {
  currentMode = mode;
  document.getElementById('tab-enc').classList.toggle('active', mode === 'encrypt');
  document.getElementById('tab-dec').classList.toggle('active', mode === 'decrypt');
  document.getElementById('caesar-btn-label').textContent = mode === 'encrypt' ? 'Execute Encryption' : 'Execute Decryption';
}

async function runCaesar() {
  const text = document.getElementById('caesar-input').value;
  const shift = document.getElementById('caesar-shift').value;
  if (!text) return;

  const res = await fetch('/api/caesar', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({text, shift, mode: currentMode})
  });
  const data = await res.json();
  const out = document.getElementById('caesar-output');
  out.innerHTML = '';
  out.textContent = data.result;
  out.style.fontFamily = 'var(--mono)';
  out.style.letterSpacing = '0.05em';
  if (typeof animateSwap === 'function') animateSwap(out);
}
</script>
{% endblock %}
